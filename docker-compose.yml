services:
  postgres:
    image: postgres:16-alpine
    container_name: chess_postgres
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess_secret
      POSTGRES_DB: chessmate
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chessmate -d chessmate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
