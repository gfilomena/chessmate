services:
  - type: web
    name: chess-clone
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chess-clone-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false   # impostato manualmente = URL del servizio Render
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URL
        sync: false

databases:
  - name: chess-clone-db
    plan: free
    databaseName: chessdb
    user: chess
