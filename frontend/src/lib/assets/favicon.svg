<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Sfondo: quadrato arrotondato verde chess.com -->
  <rect width="100" height="100" rx="19" fill="#81B64C"/>

  <!-- Alfiere bianco (path adattato da Wikimedia/lichess, scala 2× centrato) -->
  <g transform="translate(5,2) scale(2.05)" fill="#fff" stroke="none">
    <!-- Base larga -->
    <path d="M9,36 C12.39,35.03 19.11,36.43 22.5,34
             C25.89,36.43 32.61,35.03 36,36
             C36,36 37.65,36.54 39,38
             C38.32,38.97 37.35,38.99 36,38.5
             C32.61,37.53 25.89,38.96 22.5,37.5
             C19.11,38.96 12.39,37.53 9,38.5
             C7.65,38.99 6.68,38.97 6,38
             C7.35,36.54 9,36 9,36z"/>
    <!-- Corpo + testa -->
    <path d="M15,32 C17.5,34.5 27.5,34.5 30,32
             C30.5,30.5 30,30 30,30
             C30,27.5 27.5,26 27.5,26
             C33,24.5 33.5,14.5 22.5,10.5
             C11.5,14.5 12,24.5 17.5,26
             C17.5,26 15,27.5 15,30
             C15,30 14.5,30.5 15,32z"/>
    <!-- Pallina in cima -->
    <circle cx="22.5" cy="8" r="2.75"/>
  </g>

  <!-- Dettagli interni (linee orizzontali corpo + croce pallina) -->
  <g transform="translate(5,2) scale(2.05)"
     stroke="rgba(0,60,0,0.35)" stroke-width="1.1"
     fill="none" stroke-linecap="round">
    <line x1="17.5" y1="26" x2="27.5" y2="26"/>
    <line x1="15"   y1="30" x2="30"   y2="30"/>
    <line x1="22.5" y1="15.5" x2="22.5" y2="20.5"/>
    <line x1="19.8" y1="18"   x2="25.2" y2="18"/>
  </g>
</svg>
