<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 160" fill="none">
  <!-- === ICON (left side) === -->
  <g transform="translate(12,8)">
    <!-- Outer hexagon frame -->
    <polygon points="60,4 104,29.5 104,80.5 60,106 16,80.5 16,29.5"
      stroke="#1a3a5c" stroke-width="2.8" fill="none" opacity="0.75"/>
    <!-- Inner hexagon accent -->
    <polygon points="60,13 95,32 95,78 60,97 25,78 25,32"
      stroke="#81B64C" stroke-width="1.6" fill="none" opacity="0.45"/>

    <!-- Crystalline diagonal lines (geometric effect) -->
    <line x1="16" y1="29.5" x2="60" y2="55" stroke="#1a3a5c" stroke-width="1" opacity="0.25"/>
    <line x1="104" y1="29.5" x2="60" y2="55" stroke="#1a3a5c" stroke-width="1" opacity="0.25"/>
    <line x1="60" y1="55" x2="60" y2="4" stroke="#1a3a5c" stroke-width="1" opacity="0.2"/>

    <!-- Bishop head -->
    <circle cx="60" cy="24" r="6.5" fill="#1a3a5c"/>
    <!-- Neck -->
    <rect x="58" y="30" width="4" height="5" fill="#1a3a5c"/>
    <!-- Upper body (mitre shape) -->
    <path d="M50 35 Q60 41 70 35 Q68 50 60 53 Q52 50 50 35Z"
      fill="#1a3a5c"/>
    <!-- Collar stripe -->
    <rect x="52" y="53" width="16" height="3.5" rx="1.75" fill="#81B64C"/>
    <!-- Body -->
    <path d="M48 57 Q46 72 44 82 L76 82 Q74 72 72 57Z"
      fill="#1a3a5c"/>
    <!-- Body inner lines -->
    <line x1="53" y1="65" x2="67" y2="65" stroke="#81B64C" stroke-width="1.2" opacity="0.7"/>
    <line x1="51" y1="73" x2="69" y2="73" stroke="#81B64C" stroke-width="1.2" opacity="0.7"/>
    <!-- Pedestal -->
    <rect x="41" y="82" width="38" height="4.5" rx="2.25" fill="#1a3a5c"/>
    <!-- Base (green) -->
    <rect x="36" y="86.5" width="48" height="6" rx="3" fill="#81B64C"/>

    <!-- Diamond pattern at base -->
    <path d="M44 92.5 L60 100 L76 92.5 L60 85Z"
      fill="none" stroke="#1a3a5c" stroke-width="1.8" opacity="0.5"/>
    <line x1="44" y1="92.5" x2="76" y2="92.5" stroke="#1a3a5c" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- === TEXT (right side) === -->
  <!-- ChessMate -->
  <text x="138" y="68"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="42" font-weight="700"
    fill="#1a3a5c" letter-spacing="-1">ChessMate</text>

  <!-- Green underline accent -->
  <rect x="138" y="75" width="188" height="3" rx="1.5" fill="#81B64C" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="139" y="100"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="13.5" font-weight="400"
    fill="#1a3a5c" letter-spacing="2.5" opacity="0.6">PLAY &amp; LEARN CHESS ONLINE</text>
</svg>
